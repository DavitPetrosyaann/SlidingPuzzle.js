<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sliding Puzzle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
        <style>
        /* Prevent text selection and scrolling */
        body {
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        /* Custom Animations */
        @keyframes gradientX {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradientX 4s ease infinite;
        }
        
        @keyframes slideDownFade {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-down {
            animation: slideDownFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes tileDrop {
            0% { transform: scale(0.6) translateY(-30px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-tile-drop {
            animation: tileDrop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        /* Tactile Material Texture (Wood/Matte Grain) */
        .material-texture {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.15"/></svg>');
            mix-blend-mode: multiply;
            border-radius: inherit;
            z-index: 10;
        }
        .dark .material-texture {
            opacity: 0.12;
            mix-blend-mode: color-burn;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans selection:bg-indigo-500/30 w-screen h-screen transition-colors duration-300">
    <div id="root" class="w-full h-full"></div>
    <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
